name: ipad
description: "PDF Study App - iPad study and annotation application"
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^24.1.41

  # Drawing - using custom canvas approach for full control
  # pencil_kit will be added when Flutter SDK supports it properly

  # State Management & DI
  get: ^4.6.6

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio
  record: ^5.0.4
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # Utilities
  uuid: ^4.3.3
  path_provider: ^2.1.2
  file_picker: ^8.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  mockito: ^5.4.0
  mocktail: ^1.0.3
  build_verify: ^3.1.0

flutter:
  uses-material-design: true
